<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222222;
    --surface3: #2a2a2a;
    --accent: #e8f0e8;
    --accent2: #a8c4a8;
    --green: #4caf6a;
    --green-dim: #2a5c3a;
    --red: #e05555;
    --text: #f0f0f0;
    --text2: #999;
    --text3: #666;
    --border: #2e2e2e;
    --border2: #3a3a3a;
    --radius: 14px;
    --radius-sm: 8px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; max-width: 430px; margin: 0 auto; position: relative; overflow-x: hidden; }
  .header { padding: 20px 20px 0; display: flex; align-items: center; justify-content: space-between; }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon { width: 36px; height: 36px; background: var(--green); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .logo-text { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 0.08em; color: var(--accent); line-height: 1; }
  .logo-sub { font-size: 10px; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; }
  .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text3); transition: background 0.3s; }
  .sync-dot.live { background: var(--green); box-shadow: 0 0 0 3px rgba(76,175,106,0.2); }
  .sync-dot.syncing { background: #f0b429; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }
  .tabs { display: flex; margin: 20px 20px 0; background: var(--surface); border-radius: 12px; padding: 4px; gap: 4px; }
  .tab { flex: 1; padding: 10px; border: none; background: transparent; color: var(--text3); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; border-radius: 9px; cursor: pointer; transition: all 0.2s; }
  .tab.active { background: var(--surface3); color: var(--accent); box-shadow: 0 1px 4px rgba(0,0,0,0.4); }
  .content { padding: 16px 20px 100px; }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 0.05em; color: var(--accent); }
  .count-badge { background: var(--surface2); color: var(--text2); font-size: 12px; padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border); }
  .add-btn { width: 44px; height: 44px; background: var(--green); border: none; border-radius: 50%; color: #fff; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.15s; flex-shrink: 0; }
  .add-btn:active { transform: scale(0.92); }
  .player-card { background: var(--surface); border-radius: var(--radius); padding: 14px; display: flex; align-items: center; gap: 14px; margin-bottom: 10px; border: 1px solid var(--border); }
  .player-avatar { width: 56px; height: 56px; border-radius: 50%; flex-shrink: 0; background: var(--surface3); display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--green); border: 2px solid var(--border2); overflow: hidden; }
  .player-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .player-info { flex: 1; min-width: 0; }
  .player-name { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .player-contact { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .player-stats { display: flex; gap: 10px; margin-top: 6px; }
  .stat-chip { background: var(--surface3); border-radius: 6px; padding: 3px 8px; font-size: 11px; color: var(--text2); display: flex; align-items: center; gap: 4px; }
  .stat-chip .val { color: var(--green); font-weight: 600; }
  .card-actions { display: flex; flex-direction: column; gap: 6px; }
  .icon-btn { width: 32px; height: 32px; background: var(--surface3); border: 1px solid var(--border); border-radius: 8px; color: var(--text2); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .game-card { background: var(--surface); border-radius: var(--radius); margin-bottom: 12px; border: 1px solid var(--border); overflow: hidden; }
  .game-header { padding: 14px; display: flex; align-items: flex-start; gap: 12px; }
  .game-date-box { background: var(--surface3); border-radius: 10px; padding: 8px 10px; text-align: center; min-width: 52px; flex-shrink: 0; border: 1px solid var(--border); }
  .game-day { font-family: 'Bebas Neue', sans-serif; font-size: 28px; line-height: 1; color: var(--accent); }
  .game-month { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; }
  .game-info { flex: 1; min-width: 0; }
  .game-vs { font-weight: 600; font-size: 16px; }
  .game-meta { font-size: 12px; color: var(--text3); margin-top: 3px; line-height: 1.6; }
  .game-result-badge { background: var(--surface3); border: 1px solid var(--border); border-radius: 8px; padding: 4px 10px; font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--accent2); white-space: nowrap; }
  .game-result-badge.win { background: var(--green-dim); border-color: var(--green); color: #8ae8a0; }
  .game-result-badge.loss { background: #3a1a1a; border-color: var(--red); color: #f09090; }
  .game-result-badge.draw { background: #2a2a1a; border-color: #b0a030; color: #f0d060; }
  .game-roster-section { padding: 0 14px 14px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--text3); margin-bottom: 6px; }
  .progress-label .count { color: var(--accent); font-weight: 600; font-size: 13px; }
  .progress-bar { height: 6px; background: var(--surface3); border-radius: 3px; overflow: hidden; margin-bottom: 10px; }
  .progress-fill { height: 100%; background: var(--green); border-radius: 3px; transition: width 0.4s ease; }
  .progress-fill.full { background: #ffd700; }
  .avatars-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .mini-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--surface3); border: 2px solid var(--border2); font-family: 'Bebas Neue', sans-serif; font-size: 13px; color: var(--green); display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
  .mini-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .mini-avatar .scorer-badge { position: absolute; bottom: -2px; right: -2px; width: 14px; height: 14px; background: #ffd700; border-radius: 50%; font-size: 8px; display: flex; align-items: center; justify-content: center; color: #111; font-weight: 700; }
  .squad-full { background: var(--green-dim); border: 1px solid var(--green); border-radius: 8px; padding: 8px 12px; text-align: center; font-family: 'Bebas Neue', sans-serif; font-size: 16px; color: #8ae8a0; margin-bottom: 8px; }
  .game-actions { padding: 10px 14px; border-top: 1px solid var(--border); display: flex; gap: 8px; align-items: center; }
  .join-btn { flex: 1; padding: 10px; background: var(--green); border: none; border-radius: 10px; color: #fff; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 14px; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .join-btn:active { transform: scale(0.97); }
  .join-btn:disabled { background: var(--surface3); color: var(--text3); cursor: not-allowed; transform: none; }
  .result-btn { padding: 10px 12px; background: var(--surface3); border: 1px solid var(--border); border-radius: 10px; color: var(--text2); font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; white-space: nowrap; }
  .leave-btn { padding: 10px 12px; background: #2a1a1a; border: 1px solid #4a2a2a; border-radius: 10px; color: #e07070; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
  .leave-btn:active { background: #3a1a1a; }
  .del-btn { width: 40px; height: 40px; background: var(--surface3); border: 1px solid var(--border); border-radius: 10px; color: var(--text3); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; display: flex; align-items: flex-end; justify-content: center; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from{opacity:0}to{opacity:1} }
  .modal { background: var(--surface); border-radius: 20px 20px 0 0; padding: 24px 20px 40px; width: 100%; max-width: 430px; max-height: 90vh; overflow-y: auto; animation: slideUp 0.25s ease; border: 1px solid var(--border2); border-bottom: none; }
  @keyframes slideUp { from{transform:translateY(100%)}to{transform:translateY(0)} }
  .modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 0.05em; margin-bottom: 20px; color: var(--accent); }
  .modal-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 20px; }
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 12px; color: var(--text3); margin-bottom: 6px; display: block; letter-spacing: 0.05em; text-transform: uppercase; }
  .form-input { width: 100%; background: var(--surface3); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none; transition: border-color 0.15s; }
  .form-input:focus { border-color: var(--green); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .avatar-upload { width: 80px; height: 80px; border-radius: 50%; background: var(--surface3); border: 2px dashed var(--border2); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; margin: 0 auto 20px; position: relative; overflow: hidden; transition: border-color 0.15s; }
  .avatar-upload:hover { border-color: var(--green); }
  .avatar-upload img { width: 100%; height: 100%; object-fit: cover; position: absolute; border-radius: 50%; }
  .submit-btn { width: 100%; padding: 14px; background: var(--green); border: none; border-radius: 12px; color: #fff; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 16px; cursor: pointer; margin-top: 8px; transition: all 0.15s; }
  .submit-btn:disabled { background: var(--surface3); color: var(--text3); cursor: not-allowed; }
  .cancel-btn { width: 100%; padding: 12px; background: transparent; border: 1px solid var(--border); border-radius: 12px; color: var(--text3); font-family: 'DM Sans', sans-serif; font-size: 15px; cursor: pointer; margin-top: 8px; }
  .score-input-row { display: flex; align-items: center; gap: 12px; justify-content: center; margin: 16px 0; }
  .score-input { width: 70px; background: var(--surface3); border: 2px solid var(--border); border-radius: 10px; padding: 12px; color: var(--text); font-family: 'Bebas Neue', sans-serif; font-size: 32px; text-align: center; outline: none; }
  .score-input:focus { border-color: var(--green); }
  .score-dash { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--text3); }
  .scorer-list { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
  .scorer-item { display: flex; align-items: center; gap: 10px; background: var(--surface3); border-radius: 10px; padding: 10px 12px; }
  .goal-counter { display: flex; align-items: center; gap: 8px; }
  .goal-btn { width: 28px; height: 28px; background: var(--surface); border: 1px solid var(--border); border-radius: 7px; color: var(--text); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .goal-count { font-family: 'Bebas Neue', sans-serif; font-size: 18px; min-width: 20px; text-align: center; color: #ffd700; }
  .player-selector { display: flex; flex-direction: column; gap: 8px; max-height: 280px; overflow-y: auto; }
  .player-select-item { display: flex; align-items: center; gap: 10px; background: var(--surface3); border-radius: 10px; padding: 10px 12px; cursor: pointer; border: 2px solid transparent; transition: all 0.15s; }
  .player-select-item.selected { border-color: var(--green); background: var(--green-dim); }
  .empty { text-align: center; padding: 48px 20px; color: var(--text3); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
  .empty-text { font-size: 14px; line-height: 1.6; }
  .loading { text-align: center; padding: 40px; color: var(--text3); font-size: 13px; }
  .spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--surface3); border: 1px solid var(--border2); border-radius: 10px; padding: 10px 20px; font-size: 13px; color: var(--text); z-index: 200; opacity: 0; transition: all 0.3s; white-space: nowrap; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: var(--surface); border-top: 1px solid var(--border); display: flex; padding: 0 0 env(safe-area-inset-bottom,10px); }
  .nav-item { flex: 1; padding: 14px 0 12px; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; border: none; background: transparent; color: var(--text3); font-size: 10px; font-family: 'DM Sans', sans-serif; letter-spacing: 0.05em; transition: color 0.15s; }
  .nav-item.active { color: var(--green); }
  .nav-icon { font-size: 22px; }
</style>
</head>

// Firebase keys can't contain: . # $ / [ ]
// Our team names have "/" and "." (e.g. "BK Norlys - Rød/Hvid", "Gebr. Heinemann Retail - Hvid")
// so we encode those characters when writing and decode when reading.
function encodeTeamKey(name) {
  return name.replace(/\//g, '__SL__').replace(/\./g, '__DT__').replace(/#/g,'__HS__').replace(/\$/g,'__DL__').replace(/\[/g,'__LB__').replace(/\]/g,'__RB__');
}
function decodeTeamKey(key) {
  return key.replace(/__SL__/g, '/').replace(/__DT__/g, '.').replace(/__HS__/g,'#').replace(/__DL__/g,'$').replace(/__LB__/g,'[').replace(/__RB__/g,']');
}
function decodeLeagueTeams(encodedTeams) {
  if (!encodedTeams) return {};
  const out = {};
  Object.entries(encodedTeams).forEach(([k, v]) => { out[decodeTeamKey(k)] = v; });
  return out;
}
function encodeLeagueTeams(teams) {
  const out = {};
  Object.entries(teams).forEach(([k, v]) => { out[encodeTeamKey(k)] = v; });

}

// ============================================================
// LEAGUE TABLE: PASTE PARSER & MANUAL EDIT
// ============================================================

// Helper: find known teams in a line, ordered by position they appear
function findTeamsInLine(line) {
  const sortedTeams = [...leagueTeams].sort((a,b) => b.name.length - a.name.length);
  const found = [];
  let remaining = line;
  for (const t of sortedTeams) {
    const idx = remaining.indexOf(t.name);
    if (idx !== -1) {
      found.push({ name: t.name, idx: line.indexOf(t.name) });
      // Replace with spaces so we don't re-match overlapping names (e.g. "BK" prefix)
      remaining = remaining.slice(0,idx) + ' '.repeat(t.name.length) + remaining.slice(idx + t.name.length);
    }
  }
  found.sort((a,b) => a.idx - b.idx);
  return found.map(f => f.name);
}

// AUTO-DETECTING parser — handles both:
//   1. Standings table: "1 Team - Sort Club 2 2 0 0 17-7 6"
//   2. Match schedule:  "13-04-2026 17:30 Venue Team1 Team2 Pulje 1 Kval" + "5-2" on next line
function parsePastedText(text) {
  // Detect schedule format by looking for date patterns like "DD-MM-2026"
  const isSchedule = /\d{2}-\d{2}-20\d{2}/.test(text);
  if (isSchedule) return parseScheduleText(text);
  return parseStandingsText(text);
}

// Parse the full match schedule — walks matches, computes W/D/L/gf/ga/pts from scratch
function parseScheduleText(text) {
  const stats = {};
  leagueTeams.forEach(t => stats[t.name] = { p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0 });

  const lines = text.split(/\r?\n/).map(l => l.trim());
  let parsedMatches = 0;

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    // Match rows start with a date like "13-04-2026"
    if (!/\d{2}-\d{2}-20\d{2}/.test(line)) continue;

    const teams = findTeamsInLine(line);
    if (teams.length !== 2) continue;

    // Score could be on the same line or the next line (the tournament site puts it on next line)
    // First strip date+time from the line so we don't confuse date dashes with scores
    const cleaned = line.replace(/\d{2}-\d{2}-20\d{2}\s*\d{1,2}:\d{2}/, '');
    let scoreMatch = cleaned.match(/(?:^|\s)(\d+)\s*[-–]\s*(\d+)(?:\s|$)/);
    if (!scoreMatch && i+1 < lines.length) {
      const next = lines[i+1];
      if (next && !/\d{2}-\d{2}-20\d{2}/.test(next)) {
        const m = next.match(/^\s*(\d+)\s*[-–]\s*(\d+)\s*$/);
        if (m) scoreMatch = m;
      }
    }

    if (!scoreMatch) continue; // Match not played yet — skip

    const hg = parseInt(scoreMatch[1]);
    const ag = parseInt(scoreMatch[2]);
    if (isNaN(hg) || isNaN(ag)) continue;

    const [home, away] = teams;
    stats[home].p++; stats[away].p++;
    stats[home].gf += hg; stats[home].ga += ag;
    stats[away].gf += ag; stats[away].ga += hg;
    if (hg > ag)      { stats[home].w++; stats[home].pts += 3; stats[away].l++; }
    else if (hg < ag) { stats[away].w++; stats[away].pts += 3; stats[home].l++; }
    else              { stats[home].d++; stats[home].pts += 1; stats[away].d++; stats[away].pts += 1; }
    parsedMatches++;
  }

  // Only return teams with at least one match
  const results = {};
  Object.entries(stats).forEach(([name, s]) => {
    if (s.p > 0) results[name] = s;
  });
  const unmatched = leagueTeams.map(t=>t.name).filter(n => !results[n]);
  return { results, unmatched, mode: 'schedule', matchCount: parsedMatches };
}

// Parse the standings table (Pl. Team Club K V U T Score Pts)
function parseStandingsText(text) {
  const results = {};
  const lines = text.split(/\r?\n/);

  for (const raw of lines) {
    const line = raw.trim();
    if (!line) continue;
    // Skip header rows
    if (/^(pl\.?|hold|klub|kampe|pulje|score|point|kvalif)/i.test(line) && !/\d+-\d+/.test(line)) continue;

    // Find which known team this line refers to
    const sortedTeams = [...leagueTeams].sort((a,b) => b.name.length - a.name.length);
    const matched = sortedTeams.find(t => {
      const parts = t.name.split(' - ');
      return line.includes(t.name) || (parts[0] && line.includes(parts[0]));
    });

    if (!matched) continue;

    const scoreMatch = line.match(/(\d+)\s*[-–]\s*(\d+)/);
    if (!scoreMatch) continue;
    const gf = parseInt(scoreMatch[1]);
    const ga = parseInt(scoreMatch[2]);

    const remainder = line.replace(scoreMatch[0], ' SCORE ');
    const nums = (remainder.match(/\b\d+\b/g) || []).map(Number);

    if (nums.length < 6) continue;
    const [pos, p, w, d, l] = nums;
    const pts = nums[nums.length - 1];

    results[matched.name] = { p, w, d, l, gf, ga, pts };
  }

  const unmatched = leagueTeams.map(t=>t.name).filter(n => !results[n]);
  return { results, unmatched, mode: 'standings' };
}

        <div class="modal-title">📋 Paste from Tournament Site</div>

          Paste <strong>either</strong> the standings table <strong>or</strong> the full match schedule (Kampplan). The app detects which and updates the table.
        </div>
        <div class="form-group">
          <label class="form-label">Paste here</label>
          <textarea class="form-input" id="pasteArea" rows="10" placeholder="Either format works:

Standings:  1  The Helping Hands - Sort  Hands  2  2  0  0  17-7  6

Schedule:   13-04-2026 17:30  Venue  Team A  Team B  Pulje 1  1  Kvalifikation
            5-2" style="font-family:monospace;font-size:12px;resize:vertical;min-height:180px;"></textarea>
        </div>
        <div id="pastePreview" style="font-size:12px;color:var(--text3);margin-bottom:12px;min-height:20px;"></div>
        <button class="submit-btn" onclick="applyPaste()">Parse & Save</button>
        <button class="cancel-btn" onclick="closeModal()">Cancel</button>
      </div>
    </div>`;

  const ta = document.getElementById('pasteArea');
  const preview = document.getElementById('pastePreview');
  ta.addEventListener('input', () => {
    if (!ta.value.trim()) { preview.innerHTML=''; return; }
    const out = parsePastedText(ta.value);
    const matched = Object.keys(out.results).length;
    const modeLabel = out.mode === 'schedule'
      ? `📅 Schedule detected${out.matchCount?` · ${out.matchCount} played matches`:''}`
      : `📋 Standings detected`;
    if (matched === 0) {
      preview.innerHTML = `<span style="color:#f09090;">⚠️ No teams matched — check the format</span>`;
    } else {
      preview.innerHTML = `<span style="color:var(--green);">✅ ${modeLabel} · Matched ${matched}/16 teams${out.unmatched.length ? ` &nbsp;·&nbsp; <span style="color:#f0b429">${out.unmatched.length} with no data</span>` : ''}</span>`;
    }
  });
};

window.applyPaste = async function() {
  const text = document.getElementById('pasteArea').value;
  const out = parsePastedText(text);
  const matched = Object.keys(out.results).length;

  if (matched === 0) {
    showToast('No teams matched. Check format.');
    return;
  }

  // For schedule: replace (authoritative). For standings: merge.
  let merged;
  if (out.mode === 'schedule') {
    merged = {};
    leagueTeams.forEach(t => {
      merged[t.name] = out.results[t.name] || { p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0 };
    });
  } else {
    if (out.unmatched.length > 0) {
      if (!confirm(`Matched ${matched}/16 teams.\nMissing: ${out.unmatched.join(', ')}\n\nSave anyway?`)) return;
    }
    const existing = (leagueData && leagueData.teams) || {};
    merged = { ...existing, ...out.results };
  }

  setSyncStatus('syncing');
  try {
    await set(ref(db,'leagueData'), {
      teams: encodeLeagueTeams(merged),
      updatedAt: Date.now(),
      updatedBy: out.mode
    });
    closeModal();
    showToast(`✅ Updated from ${out.mode}`);
  } catch(e) {
    console.error('Save failed:', e);
    const msg = (e && e.message) ? e.message : String(e);
    alert(`❌ Save failed:\n\n${msg}`);
    setSyncStatus('offline');
  }
};

window.openLeagueSource = function() {
  const url = prompt('Tournament page URL (optional — for your reference):',
    (leagueData && leagueData.sourceUrl) || 'https://');
  if (url === null) return;
  if (url && url !== 'https://') {
    window.open(url, '_blank');
  }
};

window.openEditTeamRow = function(teamName) {
  const existing = (leagueData && leagueData.teams && leagueData.teams[teamName]) || { p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0 };

        </div>

      </div>
    </div>`;

  // Auto-update points when W or D changes
  const syncPts = () => {
    const w = parseInt(document.getElementById('tW').value)||0;
    const d = parseInt(document.getElementById('tD').value)||0;
    document.getElementById('tPts').value = w*3 + d;
  };
  document.getElementById('tW').addEventListener('input', syncPts);
  document.getElementById('tD').addEventListener('input', syncPts);
};

window.saveTeamRow = async function(teamName) {
  const row = {
    p:  parseInt(document.getElementById('tP').value)||0,
    w:  parseInt(document.getElementById('tW').value)||0,
    d:  parseInt(document.getElementById('tD').value)||0,
    l:  parseInt(document.getElementById('tL').value)||0,
    gf: parseInt(document.getElementById('tGF').value)||0,
    ga: parseInt(document.getElementById('tGA').value)||0,
    pts:parseInt(document.getElementById('tPts').value)||0,
  };

  const existing = (leagueData && leagueData.teams) || {};
  const merged = { ...existing, [teamName]: row };

  setSyncStatus('syncing');
  try {
    await set(ref(db,'leagueData'), {
      teams: encodeLeagueTeams(merged),
      updatedAt: Date.now(),
      updatedBy: 'edit'
    });
    closeModal();
    showToast(`✅ Saved ${teamName.length > 20 ? teamName.slice(0,18)+'…' : teamName}`);
  } catch(e) {
    console.error('Save failed:', e);
    const msg = (e && e.message) ? e.message : String(e);
    alert(`❌ Save failed:\n\n${msg}`);
    setSyncStatus('offline');
  }
};

// STATS TAB — top scorers, top assists, team totals

function renderStats() {
  const c = document.getElementById('mainContent');
  const arr = Object.entries(players).map(([id,p])=>({id,...p}));

  // Build per-player totals across all games
  const totalGoals = pid => Object.values(games).reduce((s,g)=>s+(g.scorers&&g.scorers[pid]?g.scorers[pid]:0),0);
  const totalAssists = pid => Object.values(games).reduce((s,g)=>s+(g.assists&&g.assists[pid]?g.assists[pid]:0),0);
  const gPlayed = pid => Object.values(games).filter(g=>g.players&&g.players[pid]).length;

  const withStats = arr.map(p => ({
    ...p,
    goals: totalGoals(p.id),
    assists: totalAssists(p.id),
    games: gPlayed(p.id),
  }));

  const topScorers = [...withStats].filter(p=>p.goals>0).sort((a,b) => b.goals-a.goals || b.assists-a.assists).slice(0,10);
  const topAssists = [...withStats].filter(p=>p.assists>0).sort((a,b) => b.assists-a.assists || b.goals-a.goals).slice(0,10);

  // Team totals
  const playedGames = Object.values(games).filter(g => g.result && /^\d+-\d+$/.test(g.result));
  let teamGoals = 0, teamConceded = 0, teamWins = 0, teamDraws = 0, teamLosses = 0;
  playedGames.forEach(g => {
    const [hv, av] = g.result.split('-').map(Number);
    teamGoals += hv; teamConceded += av;
    if (hv>av) teamWins++; else if (hv<av) teamLosses++; else teamDraws++;
  });
  const totalPlayerGoals = withStats.reduce((s,p)=>s+p.goals,0);
  const totalPlayerAssists = withStats.reduce((s,p)=>s+p.assists,0);
  const avgGoalsPerGame = playedGames.length ? (teamGoals/playedGames.length).toFixed(1) : '—';

  let h = `<div class="section-header">
    <div class="section-title">Stats</div>
    <span class="count-badge">${playedGames.length} kampe spillet</span>
  </div>`;

  // Team totals hero card
  h += `<div style="background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:16px;margin-bottom:16px;">
    <div style="font-size:11px;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:12px;">Team Totals</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;">
      <div style="text-align:center;">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:32px;color:#8ae8a0;line-height:1;">${teamGoals}</div>
        <div style="font-size:10px;color:var(--text3);margin-top:4px;text-transform:uppercase;letter-spacing:0.05em;">Goals</div>
      </div>
      <div style="text-align:center;">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:32px;color:#f09090;line-height:1;">${teamConceded}</div>
        <div style="font-size:10px;color:var(--text3);margin-top:4px;text-transform:uppercase;letter-spacing:0.05em;">Conceded</div>
      </div>
      <div style="text-align:center;">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:32px;color:#ffd700;line-height:1;">${avgGoalsPerGame}</div>
        <div style="font-size:10px;color:var(--text3);margin-top:4px;text-transform:uppercase;letter-spacing:0.05em;">Avg/Game</div>
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);">
      <div style="flex:1;text-align:center;">
        <div style="font-size:18px;font-weight:700;color:#8ae8a0;">${teamWins}</div>
        <div style="font-size:10px;color:var(--text3);">Wins</div>
      </div>
      <div style="flex:1;text-align:center;">
        <div style="font-size:18px;font-weight:700;color:#f0d060;">${teamDraws}</div>
        <div style="font-size:10px;color:var(--text3);">Draws</div>
      </div>
      <div style="flex:1;text-align:center;">
        <div style="font-size:18px;font-weight:700;color:#f09090;">${teamLosses}</div>
        <div style="font-size:10px;color:var(--text3);">Losses</div>
      </div>
    </div>
  </div>`;

  // Top scorers
  h += `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;margin-top:4px;">
    <div style="font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:0.05em;color:var(--accent);">⚽ Top Scorers</div>
    <span class="count-badge">${totalPlayerGoals} total</span>
  </div>`;

  if (!topScorers.length) {
    h += `<div style="padding:24px;text-align:center;color:var(--text3);font-size:13px;background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);margin-bottom:20px;">No goals scored yet</div>`;
  } else {
    h += `<div style="background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;margin-bottom:20px;">`;
    topScorers.forEach((p, i) => {
      const rankBg = i===0 ? '#ffd700' : i===1 ? '#c0c0c0' : i===2 ? '#cd7f32' : 'var(--surface3)';
      const rankColor = i<=2 ? '#111' : 'var(--text3)';
      const av = p.photo ? `<img src="${p.photo}" style="width:100%;height:100%;object-fit:cover;">` : initials(p.name);
      h += `<div style="display:flex;align-items:center;gap:12px;padding:12px 14px;${i<topScorers.length-1?'border-bottom:1px solid var(--border);':''}">
        <div style="width:26px;height:26px;border-radius:50%;background:${rankBg};color:${rankColor};font-family:'Bebas Neue',sans-serif;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">${i+1}</div>
        <div style="width:40px;height:40px;border-radius:50%;background:var(--surface3);border:2px solid var(--border2);overflow:hidden;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--green);flex-shrink:0;">${av}</div>
        <div style="flex:1;min-width:0;">
          <div style="font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${p.name}</div>
          <div style="font-size:11px;color:var(--text3);margin-top:2px;">${p.games} games · ${p.assists} assists · ${p.games>0?(p.goals/p.games).toFixed(2):'0'} per game</div>
        </div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:28px;color:#ffd700;line-height:1;">${p.goals}</div>
      </div>`;
    });
    h += `</div>`;
  }

  // Top assists
  h += `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
    <div style="font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:0.05em;color:var(--accent);">👟 Top Assists</div>
    <span class="count-badge">${totalPlayerAssists} total</span>
  </div>`;

  if (!topAssists.length) {
    h += `<div style="padding:24px;text-align:center;color:var(--text3);font-size:13px;background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);margin-bottom:20px;">No assists yet</div>`;
  } else {
    h += `<div style="background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;margin-bottom:20px;">`;
    topAssists.forEach((p, i) => {
      const rankBg = i===0 ? '#60aaff' : i===1 ? '#8ac4ff' : i===2 ? '#a0d0ff' : 'var(--surface3)';
      const rankColor = i<=2 ? '#111' : 'var(--text3)';
      const av = p.photo ? `<img src="${p.photo}" style="width:100%;height:100%;object-fit:cover;">` : initials(p.name);
      h += `<div style="display:flex;align-items:center;gap:12px;padding:12px 14px;${i<topAssists.length-1?'border-bottom:1px solid var(--border);':''}">
        <div style="width:26px;height:26px;border-radius:50%;background:${rankBg};color:${rankColor};font-family:'Bebas Neue',sans-serif;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">${i+1}</div>
        <div style="width:40px;height:40px;border-radius:50%;background:var(--surface3);border:2px solid var(--border2);overflow:hidden;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--green);flex-shrink:0;">${av}</div>
        <div style="flex:1;min-width:0;">
          <div style="font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${p.name}</div>
          <div style="font-size:11px;color:var(--text3);margin-top:2px;">${p.games} games · ${p.goals} goals</div>
        </div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:28px;color:#60aaff;line-height:1;">${p.assists}</div>
      </div>`;
    });
    h += `</div>`;
  }

  // All players with contributions (goals + assists combined)
  const contributors = withStats.filter(p => p.goals+p.assists > 0)
    .sort((a,b)=>(b.goals+b.assists)-(a.goals+a.assists))
    .slice(0,15);
  if (contributors.length) {
    h += `<div style="font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:0.05em;color:var(--accent);margin-bottom:10px;">🎯 Goal Contributions</div>
      <div style="background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;margin-bottom:20px;">`;
    contributors.forEach((p, i) => {
      const total = p.goals + p.assists;
      h += `<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;${i<contributors.length-1?'border-bottom:1px solid var(--border);':''}">
        <div style="flex:1;min-width:0;">
          <div style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${p.name}</div>
          <div style="font-size:10px;color:var(--text3);margin-top:2px;">⚽ ${p.goals} · 👟 ${p.assists}</div>
        </div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--accent);">${total}</div>
      </div>`;
    });
    h += `</div>`;
  }

  c.innerHTML = h;
}

function avatarEl(p, size=56) {
  const st = `width:${size}px;height:${size}px;`;
  if (p.photo) return `<div class="player-avatar" style="${st}"><img src="${p.photo}"></div>`;
  return `<div class="player-avatar" style="${st}">${initials(p.name)}</div>`;
}
function miniAv(p, goals=0, assists=0) {
  const c = p.photo ? `<img src="${p.photo}">` : initials(p.name);
  const b = goals>0 ? `<span class="scorer-badge" style="background:#ffd700">${goals}</span>` : (assists>0 ? `<span class="scorer-badge" style="background:#60aaff;color:#fff">${assists}</span>` : '');
  return `<div class="mini-avatar" title="${p.name} ${goals>0?'⚽'+goals:''} ${assists>0?'👟'+assists:''}">${c}${b}</div>`;
}

function renderGames() {
  const c = document.getElementById('mainContent');
  const arr = Object.entries(games).map(([id,g])=>({id,...g}))
    .sort((a,b)=>(a.date+a.time)>(b.date+b.time)?1:-1);

  let h = `<div class="section-header">
    <div class="section-title">Games</div>
    <span class="count-badge">${arr.length} kampe</span>
  </div>`;

  if (!arr.length) {
    h += `<div class="empty"><div class="empty-icon">📅</div><div class="empty-text">No games yet.<br>Create the first game!</div></div>`;
  } else {
    arr.forEach(g => {
      const dt = formatDate(g.date);
      const sids = g.players ? Object.keys(g.players) : [];
      const n = sids.length, MAX=10, pct=Math.min(n/MAX*100,100), full=n>=MAX;
      let avs = sids.map(pid=>{ const pl=players[pid]; return pl?miniAv({...pl,id:pid},g.scorers&&g.scorers[pid]?g.scorers[pid]:0, g.assists&&g.assists[pid]?g.assists[pid]:0):''; }).join('');
      let rb='';
      if (g.result) {
        const [hv,av]=g.result.split('-').map(Number);
        rb=`<div class="game-result-badge ${hv>av?'win':hv<av?'loss':'draw'}">${g.result}</div>`;
      }
      h += `<div class="game-card">
        <div class="game-header">
          <div class="game-date-box"><div class="game-day">${dt.day}</div><div class="game-month">${dt.month}</div></div>
          <div class="game-info">
            <div class="game-vs">vs ${g.opponent}</div>
            <div class="game-meta">🕐 ${g.time} &nbsp;|&nbsp; 📍 ${g.address}</div>
          </div>
          ${rb}
        </div>
        <div class="game-roster-section">
          <div class="progress-label"><span>Squad</span><span class="count">${n} / ${MAX} players</span></div>
          <div class="progress-bar"><div class="progress-fill${full?' full':''}" style="width:${pct}%"></div></div>
          ${full?'<div class="squad-full">⭐ Squad Full — 10/10</div>':''}
          <div class="avatars-row">${avs||'<span style="font-size:12px;color:var(--text3)">No players signed up yet</span>'}</div>
        </div>
        <div class="game-actions">
          <button class="join-btn"${full?' disabled':''} onclick="openJoinGame('${g.id}')">${full?'🔒 Full':'+ Sign Up'}</button>
          <button class="leave-btn" onclick="openLeaveGame('${g.id}')">− Leave</button>
          <button class="result-btn" onclick="openResult('${g.id}')">📊 Result</button>
        </div>
      </div>`;
    });
  }
  c.innerHTML = h;
}

window.openAddPlayer = () => { editingPlayer=null; showPlayerModal(); };
window.openEditPlayer = id => { editingPlayer={id,...players[id]}; showPlayerModal(); };

function showPlayerModal() {
  const p=editingPlayer, isEdit=!!p;
  document.getElementById('modalContainer').innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title">${isEdit?'Edit Player':'Add Player'}</div>
      <div style="text-align:center;">
        <label for="photoInput" style="cursor:pointer;">
          <div class="avatar-upload" id="avatarPreview">
            ${p&&p.photo?`<img src="${p.photo}" id="avatarImg">`:'<span style="font-size:24px;color:var(--text3)">📷</span><span style="font-size:10px;color:var(--text3);margin-top:4px">Photo</span>'}
          </div>
        </label>
        <input type="file" id="photoInput" accept="image/*" style="display:none" onchange="previewPhoto(this)">
      </div>
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input class="form-input" id="inputName" placeholder="e.g. Jonas Hansen" value="${p?p.name:''}">
      </div>
      <div class="form-group">
        <label class="form-label">Contact (phone or email)</label>
        <input class="form-input" id="inputContact" placeholder="e.g. +45 12345678" value="${p?p.contact:''}">
      </div>
      <button class="submit-btn" id="savePlayerBtn" onclick="savePlayer()">${isEdit?'Save Changes':'Add Player'}</button>
      <button class="cancel-btn" onclick="closeModal()">Cancel</button>
    </div>
  </div>`;
}

window.previewPhoto = input => {
  if (!input.files||!input.files[0]) return;
  const r=new FileReader();
  r.onload=e=>{
    document.getElementById('avatarPreview').innerHTML=`<img src="${e.target.result}" id="avatarImg">`;
  };
  r.readAsDataURL(input.files[0]);
};

window.savePlayer = async () => {
  const name=document.getElementById('inputName').value.trim();
  const contact=document.getElementById('inputContact').value.trim();
  if (!name||!contact){showToast('Please fill in all fields');return;}
  const btn=document.getElementById('savePlayerBtn');
  btn.disabled=true; btn.textContent='Saving...';
  setSyncStatus('syncing');
  const imgEl=document.getElementById('avatarImg');
  const photo=imgEl?imgEl.src:(editingPlayer?editingPlayer.photo||'':'');
  try {
    if (editingPlayer) {
      await update(ref(db,`players/${editingPlayer.id}`),{name,contact,photo});
      showToast('Player updated! ✅');
    } else {
      await set(push(ref(db,'players')),{name,contact,photo});
      showToast('Player added! ✅');
    }
    closeModal();
  } catch(e){showToast('Error saving.');btn.disabled=false;btn.textContent='Save';}
};

window.deletePlayer = async id => {
  if (!confirm('Remove this player?')) return;
  setSyncStatus('syncing');
  try {
    await remove(ref(db,`players/${id}`));
    const updates={};
    Object.keys(games).forEach(gid=>{
      if (games[gid].players&&games[gid].players[id]) updates[`games/${gid}/players/${id}`]=null;
      if (games[gid].scorers&&games[gid].scorers[id]) updates[`games/${gid}/scorers/${id}`]=null;
    });
    if (Object.keys(updates).length) await update(ref(db),updates);
    showToast('Player removed');
  } catch(e){showToast('Error. Try again.');}
};

window.openAddGame = () => {
  const today=new Date().toISOString().split('T')[0];
  document.getElementById('modalContainer').innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title">New Game</div>
      <div class="form-group">
        <label class="form-label">Opponent Team</label>
        <input class="form-input" id="inputOpponent" placeholder="e.g. Hamburg United">
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Date</label><input class="form-input" id="inputDate" type="date" value="${today}"></div>
        <div class="form-group"><label class="form-label">Time (24h)</label><input class="form-input" id="inputTime" type="time" value="18:00"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Address / Location</label>
        <input class="form-input" id="inputAddress" placeholder="e.g. Stadtpark, Hamburg">
      </div>
      <button class="submit-btn" id="saveGameBtn" onclick="saveGame()">Create Game</button>
      <button class="cancel-btn" onclick="closeModal()">Cancel</button>
    </div>
  </div>`;
};

window.saveGame = async () => {
  const opponent=document.getElementById('inputOpponent').value.trim();
  const date=document.getElementById('inputDate').value;
  const time=document.getElementById('inputTime').value;
  const address=document.getElementById('inputAddress').value.trim();
  if (!opponent||!date||!time||!address){showToast('Please fill in all fields');return;}
  const btn=document.getElementById('saveGameBtn');
  btn.disabled=true; btn.textContent='Creating...';
  setSyncStatus('syncing');
  try {
    await set(push(ref(db,'games')),{opponent,date,time,address,players:{},scorers:{},result:''});
    closeModal(); showToast('Game created! ✅');
  } catch(e){showToast('Error. Try again.');btn.disabled=false;btn.textContent='Create Game';}
};

window.deleteGame = async id => {
  if (!confirm('Delete this game?')) return;
  setSyncStatus('syncing');
  try { await remove(ref(db,`games/${id}`)); showToast('Game deleted'); }
  catch(e){showToast('Error. Try again.');}
};

window.openJoinGame = gameId => {
  const game=games[gameId];
  if (!game) return;
  const arr=Object.entries(players).map(([id,p])=>({id,...p}));
  if (!arr.length){showToast('No players added yet!');return;}
  const sids=game.players?Object.keys(game.players):[];
  let list='';
  arr.forEach(p=>{
    const isIn=sids.includes(p.id);
    const av=p.photo?`<img src="${p.photo}" style="width:36px;height:36px;object-fit:cover;border-radius:50%;">`
      :`<div style="width:36px;height:36px;background:var(--surface);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';font-size:13px;color:var(--green);border:2px solid var(--border2)">${initials(p.name)}</div>`;
    list+=`<div class="player-select-item${isIn?' selected':''}" id="sel_${p.id}" onclick="togglePlayer('${gameId}','${p.id}')">
      <div style="overflow:hidden;border-radius:50%;flex-shrink:0">${av}</div>
      <span style="flex:1;font-size:14px">${p.name}</span>
      <span id="sc_${p.id}">${isIn?'✅':'⬜'}</span>
    </div>`;
  });
  document.getElementById('modalContainer').innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title">Sign Up — vs ${game.opponent}</div>
      <div style="font-size:12px;color:var(--text3);margin-bottom:12px">Tap to add/remove players (max 10)</div>
      <div class="player-selector">${list}</div>
      <button class="submit-btn" onclick="closeModal()" style="margin-top:16px">Done</button>
    </div>
  </div>`;
};

window.togglePlayer = async (gameId, playerId) => {
  const game=games[gameId]; if (!game) return;
  const sids=game.players?Object.keys(game.players):[];
  const isIn=sids.includes(playerId);
  if (!isIn&&sids.length>=10){showToast('Squad is full! (10/10)');return;}
  setSyncStatus('syncing');
  try {
    if (isIn) {
      await update(ref(db),{[`games/${gameId}/players/${playerId}`]:null,[`games/${gameId}/scorers/${playerId}`]:null});
    } else {
      await set(ref(db,`games/${gameId}/players/${playerId}`),true);
    }
    const el=document.getElementById(`sel_${playerId}`);
    const sc=document.getElementById(`sc_${playerId}`);
    if (el&&sc){ el.className='player-select-item'+(!isIn?' selected':''); sc.textContent=!isIn?'✅':'⬜'; }
  } catch(e){showToast('Error. Try again.');}
};

window.openLeaveGame = gameId => {
  const game=games[gameId]; if (!game) return;
  const sids=game.players?Object.keys(game.players):[];
  const signedPlayers=sids.map(id=>({id,...players[id]})).filter(p=>p.name);
  if (!signedPlayers.length){showToast('No players signed up yet');return;}
  let list='';
  signedPlayers.forEach(p=>{
    const av=p.photo?`<img src="${p.photo}" style="width:36px;height:36px;object-fit:cover;border-radius:50%;">`
      :`<div style="width:36px;height:36px;background:var(--surface);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';font-size:13px;color:var(--green);border:2px solid var(--border2)">${initials(p.name)}</div>`;
    list+=`<div style="display:flex;align-items:center;gap:12px;background:var(--surface3);border-radius:10px;padding:10px 12px;">
      <div style="overflow:hidden;border-radius:50%;flex-shrink:0">${av}</div>
      <span style="flex:1;font-size:14px">${p.name}</span>
      <button onclick="leaveGame('${gameId}','${p.id}')" style="padding:6px 14px;background:#2a1a1a;border:1px solid #4a2a2a;border-radius:8px;color:#e07070;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;">Leave</button>
    </div>`;
  });
  document.getElementById('modalContainer').innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title">Leave Game — vs ${game.opponent}</div>
      <div style="font-size:12px;color:var(--text3);margin-bottom:12px">Select a player to remove from this game</div>
      <div style="display:flex;flex-direction:column;gap:8px">${list}</div>
      <button class="cancel-btn" onclick="closeModal()" style="margin-top:16px">Cancel</button>
    </div>
  </div>`;
};

window.leaveGame = async (gameId, playerId) => {
  setSyncStatus('syncing');
  try {
    await update(ref(db),{
      [`games/${gameId}/players/${playerId}`]:null,
      [`games/${gameId}/scorers/${playerId}`]:null
    });
    showToast('Player removed from game ✅');
    closeModal();
  } catch(e){showToast('Error. Try again.');}
};

window.openResult = gameId => {
  const game=games[gameId]; if (!game) return;
  const sc=game.scorers||{};
  const as=game.assists||{};
  const sPlayers=(game.players?Object.keys(game.players):[]).map(id=>({id,...players[id]})).filter(p=>p.name);
  let shtml='';
  if (sPlayers.length) {
    shtml=`<div style="display:grid;grid-template-columns:1fr 80px 80px;gap:0;margin:12px 0 6px;padding:0 2px;">
      <span style="font-size:10px;color:var(--text3);letter-spacing:0.05em;text-transform:uppercase">Player</span>
      <span style="font-size:10px;color:#ffd700;letter-spacing:0.05em;text-transform:uppercase;text-align:center">⚽ Goals</span>
      <span style="font-size:10px;color:#60aaff;letter-spacing:0.05em;text-transform:uppercase;text-align:center">👟 Assists</span>
    </div><div class="scorer-list">`;
    sPlayers.forEach(p=>{
      const g=sc[p.id]||0;
      const a=as[p.id]||0;
      const av=p.photo?`<img src="${p.photo}" style="width:32px;height:32px;object-fit:cover;border-radius:50%">`
        :`<div style="width:32px;height:32px;background:var(--surface3);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';font-size:12px;color:var(--green)">${initials(p.name)}</div>`;
      shtml+=`<div class="scorer-item">
        <div style="overflow:hidden;border-radius:50%;flex-shrink:0">${av}</div>
        <span style="flex:1;font-size:13px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.name}</span>
        <div class="goal-counter">
          <button class="goal-btn" onclick="changeGoals('${gameId}','${p.id}',-1)">−</button>
          <span class="goal-count" id="gc_${p.id}" style="color:#ffd700">${g}</span>
          <button class="goal-btn" onclick="changeGoals('${gameId}','${p.id}',1)">+</button>
        </div>
        <div class="goal-counter" style="margin-left:6px;">
          <button class="goal-btn" onclick="changeAssists('${gameId}','${p.id}',-1)">−</button>
          <span class="goal-count" id="ac_${p.id}" style="color:#60aaff">${a}</span>
          <button class="goal-btn" onclick="changeAssists('${gameId}','${p.id}',1)">+</button>
        </div>
      </div>`;
    });
    shtml+='</div>';
  }
  const pts=(game.result||'').split('-');
  const hasResult = !!game.result;
  document.getElementById('modalContainer').innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title">📊 Result — vs ${game.opponent}</div>
      <div style="font-size:12px;color:var(--text3);text-align:center;margin-bottom:4px">GH FC — ${game.opponent}</div>
      <div class="score-input-row">
        <input class="score-input" id="scoreHome" type="number" min="0" max="99" value="${pts[0]||''}" placeholder="0">
        <span class="score-dash">:</span>
        <input class="score-input" id="scoreAway" type="number" min="0" max="99" value="${pts[1]||''}" placeholder="0">
      </div>
      ${shtml}
      <button class="submit-btn" onclick="saveResult('${gameId}')" style="margin-top:16px">Save Result</button>
      ${hasResult ? `<button onclick="clearResult('${gameId}')" style="width:100%;padding:12px;background:#2a1a1a;border:1px solid #4a2a2a;border-radius:12px;color:#e07070;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;">🗑️ Clear Result</button>` : ''}
      <button class="cancel-btn" onclick="closeModal()">Cancel</button>
    </div>
  </div>`;
};

window.changeGoals = async (gameId, playerId, delta) => {
  const game=games[gameId]; if (!game) return;
  const cur=(game.scorers&&game.scorers[playerId])||0;
  const next=Math.max(0,cur+delta);
  setSyncStatus('syncing');
  try {
    await (next===0?update(ref(db),{[`games/${gameId}/scorers/${playerId}`]:null}):set(ref(db,`games/${gameId}/scorers/${playerId}`),next));
    const el=document.getElementById(`gc_${playerId}`);
    if (el) el.textContent=next;
  } catch(e){showToast('Error.');}
};

window.changeAssists = async (gameId, playerId, delta) => {
  const game=games[gameId]; if (!game) return;
  const cur=(game.assists&&game.assists[playerId])||0;
  const next=Math.max(0,cur+delta);
  setSyncStatus('syncing');
  try {
    await (next===0?update(ref(db),{[`games/${gameId}/assists/${playerId}`]:null}):set(ref(db,`games/${gameId}/assists/${playerId}`),next));
    const el=document.getElementById(`ac_${playerId}`);
    if (el) el.textContent=next;
  } catch(e){showToast('Error.');}
};

window.saveResult = async gameId => {
  const h=document.getElementById('scoreHome').value;
  const a=document.getElementById('scoreAway').value;
  setSyncStatus('syncing');
  try {
    await set(ref(db,`games/${gameId}/result`),(h!==''&&a!=='')?`${h}-${a}`:'');
    closeModal();
    if (h!==''&&a!=='') {
      const hv=parseInt(h), av=parseInt(a);
      if (hv>av) showWinAnimation();
      else if (hv<av) showLossAnimation();
      else showToast('Draw! 🤝');
    } else { showToast('Result saved! ✅'); }
  } catch(e){showToast('Error.');}
};

function showWinAnimation() {
  const el = document.createElement('div');
  el.id = 'animOverlay';
  el.style.cssText = 'position:fixed;inset:0;z-index:9999;pointer-events:none;overflow:hidden;';
  document.body.appendChild(el);

  // Big WIN text
  const txt = document.createElement('div');
  txt.style.cssText = `position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);
    font-family:'Bebas Neue',sans-serif;font-size:96px;color:#4caf6a;letter-spacing:0.05em;
    text-shadow:0 0 40px rgba(76,175,106,0.8);z-index:2;
    animation:winPop 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;`;
  txt.textContent = 'WIN! 🏆';
  el.appendChild(txt);

  // Confetti
  const colors = ['#4caf6a','#ffd700','#e8f0e8','#a8c4a8','#fff'];
  for (let i=0; i<80; i++) {
    const c = document.createElement('div');
    const size = Math.random()*10+5;
    const x = Math.random()*100;
    const delay = Math.random()*0.8;
    const dur = Math.random()*1.5+1.5;
    const color = colors[Math.floor(Math.random()*colors.length)];
    const rotate = Math.random()*720;
    c.style.cssText = `position:absolute;top:-20px;left:${x}%;width:${size}px;height:${size}px;
      background:${color};border-radius:${Math.random()>0.5?'50%':'2px'};
      animation:confettiFall ${dur}s ${delay}s ease-in forwards;
      transform:rotate(0deg);`;
    el.appendChild(c);
  }

  // Stars burst from center
  for (let i=0; i<12; i++) {
    const s = document.createElement('div');
    const angle = (i/12)*360;
    s.style.cssText = `position:absolute;top:50%;left:50%;width:8px;height:8px;
      background:#ffd700;border-radius:50%;transform-origin:0 0;
      animation:starBurst 0.8s ${i*0.04}s ease-out forwards;
      --angle:${angle}deg;`;
    el.appendChild(s);
  }

  const style = document.createElement('style');
  style.textContent = `
    @keyframes winPop { 0%{transform:translate(-50%,-50%) scale(0);opacity:0} 60%{opacity:1} 100%{transform:translate(-50%,-50%) scale(1);opacity:1} }
    @keyframes confettiFall { 0%{transform:translateY(0) rotate(0deg);opacity:1} 100%{transform:translateY(110vh) rotate(${Math.random()*720}deg);opacity:0} }
    @keyframes starBurst { 0%{transform:translate(0,0);opacity:1} 100%{transform:translate(calc(cos(var(--angle))*120px),calc(sin(var(--angle))*120px));opacity:0} }
  `;
  document.head.appendChild(style);

  setTimeout(() => {
    el.style.transition='opacity 0.5s';
    el.style.opacity='0';
    setTimeout(()=>{ el.remove(); style.remove(); },500);
  }, 3000);
}

function showLossAnimation() {
  const el = document.createElement('div');
  el.id = 'animOverlay';
  el.style.cssText = 'position:fixed;inset:0;z-index:9999;pointer-events:none;overflow:hidden;';
  document.body.appendChild(el);

  // Dark overlay pulse
  const overlay = document.createElement('div');
  overlay.style.cssText = `position:absolute;inset:0;background:rgba(224,85,85,0.15);
    animation:lossPulse 0.5s ease-in-out 3;`;
  el.appendChild(overlay);

  // LOSS text
  const txt = document.createElement('div');
  txt.style.cssText = `position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);
    font-family:'Bebas Neue',sans-serif;font-size:88px;color:#e05555;letter-spacing:0.05em;
    text-shadow:0 0 40px rgba(224,85,85,0.7);z-index:2;
    animation:lossPop 0.4s cubic-bezier(0.34,1.56,0.64,1) 0.2s forwards;`;
  txt.textContent = 'LOSS 😔';
  el.appendChild(txt);

  // Rain drops
  for (let i=0; i<60; i++) {
    const r = document.createElement('div');
    const x = Math.random()*100;
    const delay = Math.random()*1.5;
    const dur = Math.random()*0.8+0.6;
    const h = Math.random()*20+10;
    r.style.cssText = `position:absolute;top:-30px;left:${x}%;width:2px;height:${h}px;
      background:linear-gradient(to bottom,transparent,#e05555aa);border-radius:1px;
      animation:rainFall ${dur}s ${delay}s linear forwards;`;
    el.appendChild(r);
  }

  const style = document.createElement('style');
  style.textContent = `
    @keyframes lossPop { 0%{transform:translate(-50%,-50%) scale(0);opacity:0} 100%{transform:translate(-50%,-50%) scale(1);opacity:1} }
    @keyframes lossPulse { 0%,100%{opacity:0} 50%{opacity:1} }
    @keyframes rainFall { 0%{transform:translateY(0);opacity:1} 100%{transform:translateY(110vh);opacity:0.3} }
  `;
  document.head.appendChild(style);

  setTimeout(() => {
    el.style.transition='opacity 0.5s';
    el.style.opacity='0';
    setTimeout(()=>{ el.remove(); style.remove(); },500);
  }, 3000);
}

window.clearResult = async gameId => {
  if (!confirm('Clear the result for this game?')) return;
  setSyncStatus('syncing');
  try {
    await set(ref(db,`games/${gameId}/result`),'');
    closeModal(); showToast('Result cleared ✅');
  } catch(e){showToast('Error.');}
};

window.closeModal = closeModal;
</script>
</body>
</html>
